<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bg-grad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#141d30" />
      <stop offset="100%" stop-color="#090e1c" />
    </radialGradient>

    <!-- Glowing Cyan/Blue -->
    <linearGradient id="cyan-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00ffff" stop-opacity="1" />
      <stop offset="50%" stop-color="#00cfff" stop-opacity="0.9" />
      <stop offset="100%" stop-color="#3d8bff" stop-opacity="1" />
    </linearGradient>

    <!-- Glowing Green -->
    <linearGradient id="green-glow" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00ff9d" stop-opacity="1" />
      <stop offset="50%" stop-color="#00e676" stop-opacity="0.9" />
      <stop offset="100%" stop-color="#00c853" stop-opacity="1" />
    </linearGradient>

    <!-- Outer Glow Filter -->
    <filter id="neon-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3.5" result="blur1" />
      <feGaussianBlur stdDeviation="7" result="blur2" />
      <feMerge>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="soft-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Base App Icon Box -->
  <rect width="100" height="100" rx="22" fill="url(#bg-grad)" />
  <rect width="96" height="96" x="2" y="2" rx="20" fill="none" stroke="rgba(0, 207, 255, 0.4)" stroke-width="1.5" />

  <!-- Core Graphic translated to center -->
  <g transform="translate(15, 12)">

    <!-- Center Load Balancer Hub (Hexagon Base via Path) -->
    <path d="M 35 25 L 50 15 L 65 25 L 65 42 L 50 52 L 35 42 Z" 
          fill="rgba(10, 15, 30, 0.8)" 
          stroke="url(#cyan-glow)" stroke-width="3" 
          stroke-linejoin="round"
          filter="url(#neon-glow)" />
          
    <!-- Inner glowing triangle inside hub -->
    <path d="M 50 22 L 60 40 L 40 40 Z" fill="url(#cyan-glow)" filter="url(#soft-glow)" opacity="0.85" />

    <!-- Left Connection Pathway -->
    <path d="M 12 55 Q 12 45 25 45 L 35 35" 
          fill="none" 
          stroke="url(#green-glow)" stroke-width="4.5" 
          stroke-linecap="round" 
          filter="url(#neon-glow)" />
    <!-- Left Server Node -->
    <rect x="5" y="55" width="14" height="14" rx="4" fill="url(#green-glow)" filter="url(#soft-glow)" />

    <!-- Right Top Connection Pathway -->
    <path d="M 65 25 L 75 18 Q 85 11 88 15" 
          fill="none" 
          stroke="url(#cyan-glow)" stroke-width="4.5" 
          stroke-linecap="round" 
          filter="url(#neon-glow)" />
    <!-- Right Top Server Node -->
    <circle cx="88" cy="15" r="7" fill="url(#cyan-glow)" filter="url(#soft-glow)" />

    <!-- Right Bottom Connection Pathway -->
    <path d="M 65 42 L 75 49 Q 85 56 88 52" 
          fill="none" 
          stroke="url(#cyan-glow)" stroke-width="4.5" 
          stroke-linecap="round" 
          filter="url(#neon-glow)" />
    <!-- Right Bottom Server Node -->
    <circle cx="88" cy="52" r="7" fill="url(#cyan-glow)" filter="url(#soft-glow)" />
    
    <!-- Central Data Flow Pulses -->
    <circle cx="28" cy="38" r="2.5" fill="#ffffff" filter="url(#soft-glow)" />
    <circle cx="72" cy="20" r="2.5" fill="#ffffff" filter="url(#soft-glow)" />
    <circle cx="72" cy="47" r="2.5" fill="#ffffff" filter="url(#soft-glow)" />

  </g>
</svg>
