<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <linearGradient id="cyan-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00cfff" stop-opacity="1" />
      <stop offset="100%" stop-color="#3d8bff" stop-opacity="1" />
    </linearGradient>
    <linearGradient id="green-glow" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00e676" stop-opacity="1" />
      <stop offset="100%" stop-color="#00c853" stop-opacity="1" />
    </linearGradient>
    <filter id="neon-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <rect width="100" height="100" rx="20" fill="#0a0f1e" />

  <g transform="translate(15, 15)">
    <!-- Central Load Balancer Icon -->
    <path d="M 35 15 L 65 30 L 65 60 L 35 75 Z" fill="url(#cyan-glow)" filter="url(#neon-glow)" />
    
    <!-- Left connection -->
    <path d="M 10 45 L 35 45" stroke="url(#green-glow)" stroke-width="6" stroke-linecap="round" filter="url(#neon-glow)" />
    <circle cx="10" cy="45" r="4" fill="#00e676" filter="url(#neon-glow)" />
    
    <!-- Right top connection -->
    <path d="M 65 30 L 90 20" stroke="url(#cyan-glow)" stroke-width="6" stroke-linecap="round" filter="url(#neon-glow)" />
    <circle cx="90" cy="20" r="4" fill="#00cfff" filter="url(#neon-glow)" />
    
    <!-- Right bottom connection -->
    <path d="M 65 60 L 90 70" stroke="url(#cyan-glow)" stroke-width="6" stroke-linecap="round" filter="url(#neon-glow)" />
    <circle cx="90" cy="70" r="4" fill="#00cfff" filter="url(#neon-glow)" />
  </g>
</svg>
