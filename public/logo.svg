<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1E293B" />
      <stop offset="100%" stop-color="#0F172A" />
    </linearGradient>

    <!-- Cloud Gradients -->
    <radialGradient id="cloud1" cx="40%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#CBD5E1" />
    </radialGradient>
    
    <radialGradient id="cloud2" cx="30%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#F1F5F9" />
      <stop offset="100%" stop-color="#94A3B8" />
    </radialGradient>

    <radialGradient id="cloud3" cx="50%" cy="20%" r="60%">
      <stop offset="0%" stop-color="#F8FAFC" />
      <stop offset="100%" stop-color="#64748B" />
    </radialGradient>

    <!-- App border highlight -->
    <linearGradient id="border" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#000000" stop-opacity="0" />
    </linearGradient>

    <!-- Metallic Rack Gradients -->
    <linearGradient id="silver" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#64748B" />
      <stop offset="50%" stop-color="#E2E8F0" />
      <stop offset="100%" stop-color="#475569" />
    </linearGradient>
    
    <linearGradient id="dark-metal" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0F172A" />
      <stop offset="10%" stop-color="#1E293B" />
      <stop offset="90%" stop-color="#1E293B" />
      <stop offset="100%" stop-color="#0F172A" />
    </linearGradient>

    <!-- Lights -->
    <radialGradient id="blue-light" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#60A5FA" />
      <stop offset="100%" stop-color="#2563EB" />
    </radialGradient>
    <radialGradient id="green-light" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#34D399" />
      <stop offset="100%" stop-color="#059669" />
    </radialGradient>

    <!-- Filters -->
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="15" stdDeviation="15" flood-color="#000000" flood-opacity="0.6"/>
    </filter>
    <filter id="soft-shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="12" stdDeviation="10" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
    
    <linearGradient id="glow-tube" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#38BDF8" />
      <stop offset="100%" stop-color="#2DD4BF" />
    </linearGradient>
  </defs>

  <!-- App Icon Base -->
  <rect x="40" y="40" width="432" height="432" rx="100" fill="url(#bg)" filter="url(#shadow)"/>
  <rect x="40" y="40" width="432" height="432" rx="100" fill="none" stroke="url(#border)" stroke-width="6"/>

  <!-- Highly Realistic Cloud Cluster -->
  <g filter="url(#soft-shadow)" transform="translate(100, 110)">
    <!-- Back sphere -->
    <circle cx="210" cy="90" r="50" fill="url(#cloud3)" />
    <!-- Left sphere -->
    <circle cx="80" cy="110" r="45" fill="url(#cloud2)" />
    <!-- Main Center-Top sphere -->
    <circle cx="140" cy="70" r="65" fill="url(#cloud1)" />
    <!-- Right sphere -->
    <circle cx="260" cy="120" r="40" fill="url(#cloud2)" />
    <!-- Main Center-Bottom block connecting them -->
    <rect x="70" y="80" width="190" height="75" rx="37" fill="url(#cloud1)" />
    <path d="M 140 10 L 160 30 L 120 40 Z" fill="#FFFFFF" opacity="0.4" />
  </g>

  <!-- Load Balancer Connector Node (Center of the cloud base) -->
  <g transform="translate(256, 250)">
    <circle cx="0" cy="0" r="22" fill="url(#silver)" filter="url(#soft-shadow)"/>
    <circle cx="0" cy="0" r="14" fill="#0F172A"/>
    <circle cx="0" cy="0" r="6" fill="url(#blue-light)"/>
    
    <!-- Pipes/Cables leading down to the Servers -->
    <path d="M 0 22 L 0 100" fill="none" stroke="url(#glow-tube)" stroke-width="12" stroke-linecap="round"/>
    <path d="M -12 18 Q -100 60 -100 100" fill="none" stroke="url(#glow-tube)" stroke-width="12" stroke-linecap="round"/>
    <path d="M 12 18 Q 100 60 100 100" fill="none" stroke="url(#glow-tube)" stroke-width="12" stroke-linecap="round"/>
    
    <!-- Glowing bits inside pipes -->
    <circle cx="-50" cy="70" r="3" fill="#FFFFFF"/>
    <circle cx="0" cy="50" r="3" fill="#FFFFFF"/>
    <circle cx="50" cy="70" r="3" fill="#FFFFFF"/>
  </g>

  <!-- Realistic Server Chassis Below -->
  <g filter="url(#soft-shadow)" transform="translate(0, 310)">
    <!-- Left Blade -->
    <g transform="translate(116, 40)">
      <rect x="0" y="0" width="80" height="90" rx="6" fill="url(#dark-metal)"/>
      <rect x="0" y="0" width="80" height="90" rx="6" fill="none" stroke="url(#silver)" stroke-width="2"/>
      <!-- Grille -->
      <rect x="15" y="15" width="50" height="4" rx="2" fill="#000000"/>
      <rect x="15" y="30" width="50" height="4" rx="2" fill="#000000"/>
      <rect x="15" y="45" width="50" height="4" rx="2" fill="#000000"/>
      <!-- Status Lights -->
      <circle cx="25" cy="70" r="4" fill="url(#green-light)"/>
      <circle cx="40" cy="70" r="4" fill="url(#green-light)"/>
      <circle cx="55" cy="70" r="4" fill="#64748B"/> <!-- Off light -->
    </g>

    <!-- Center Blade (Slightly larger to show importance) -->
    <g transform="translate(216, 30)">
      <rect x="0" y="0" width="80" height="100" rx="6" fill="url(#dark-metal)"/>
      <rect x="0" y="0" width="80" height="100" rx="6" fill="none" stroke="url(#silver)" stroke-width="3"/>
      <!-- Grille -->
      <rect x="15" y="15" width="50" height="4" rx="2" fill="#000000"/>
      <rect x="15" y="30" width="50" height="4" rx="2" fill="#000000"/>
      <rect x="15" y="45" width="50" height="4" rx="2" fill="#000000"/>
      <rect x="15" y="60" width="50" height="4" rx="2" fill="#000000"/>
      <!-- Status Lights -->
      <circle cx="25" cy="80" r="4" fill="url(#green-light)"/>
      <circle cx="40" cy="80" r="4" fill="url(#blue-light)"/>
      <circle cx="55" cy="80" r="4" fill="url(#blue-light)"/>
    </g>

    <!-- Right Blade -->
    <g transform="translate(316, 40)">
      <rect x="0" y="0" width="80" height="90" rx="6" fill="url(#dark-metal)"/>
      <rect x="0" y="0" width="80" height="90" rx="6" fill="none" stroke="url(#silver)" stroke-width="2"/>
      <!-- Grille -->
      <rect x="15" y="15" width="50" height="4" rx="2" fill="#000000"/>
      <rect x="15" y="30" width="50" height="4" rx="2" fill="#000000"/>
      <rect x="15" y="45" width="50" height="4" rx="2" fill="#000000"/>
      <!-- Status Lights -->
      <circle cx="25" cy="70" r="3" fill="url(#green-light)"/>
      <circle cx="55" cy="70" r="4" fill="#F87171"/> <!-- Small red light (simulating heavy load) -->
    </g>
  </g>
</svg>
